# 测试环境：H2 内存库，Flyway 禁用（由 @Sql 或 schema.sql 建表）
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

asuka:
  jwt:
    secret: test-jwt-secret
    token-expires-hours: 1
  ai:
    base-url: http://localhost:9999
    api-key: test-key
    internal-download-token: test-token
  storage:
    list-cache-enabled: false
    link-cache-enabled: false
    local-root-whitelist:
      - /tmp
  upload:
    max-size:
      bytes: 104857600
    task-threshold:
      bytes: 10485760
  bootstrap:
    admin-username: admin
    admin-password: test-admin-password
    guest-username: guest
    guest-password: ''
    guest-enabled: false
