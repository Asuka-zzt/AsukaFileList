server:
  port: 8080

spring:
  application:
    name: asuka-file-list

  # ─── 数据源（MySQL） ─────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cloud_disk}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ─── Flyway ─────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ─── MyBatis Plus ──────────────────────────────────────────────
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml   # 预留 XML Mapper 目录
  global-config:
    db-config:
      id-type: auto                          # 对应 AUTO_INCREMENT
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.asuka.filelist: INFO
    org.springframework: INFO
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─── 业务配置 ──────────────────────────────────────────────────
asuka:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-me}
    token-expires-hours: ${TOKEN_EXPIRES_HOURS:48}
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    api-key: ${AI_SERVICE_KEY:dev-key}
    internal-download-token: ${MASTER_TOKEN:dev-master-token}
  storage:
    list-cache-enabled: true
    link-cache-enabled: true
  upload:
    max-size:
      bytes: 10737418240
    task-threshold:
      bytes: 104857600
  bootstrap:
    admin-username: ${ASUKA_ADMIN_USERNAME:admin}
    admin-password: ${ASUKA_ADMIN_PASSWORD:}
    guest-username: ${ASUKA_GUEST_USERNAME:guest}
    guest-password: ${ASUKA_GUEST_PASSWORD:}
    guest-enabled: ${ASUKA_GUEST_ENABLED:false}
