services:
  # ─────────────────────────────────────────────────────────────
  # 基础设施
  # ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: asuka-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-cloud_disk}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    # pgvector + Apache AGE 自定义镜像（pg18），供 LightRAG 的 KV/向量/图/doc-status 存储
    image: asuka-postgres-age:latest
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: asuka-postgres
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: asuka_ai
    ports:
      - "5432:5432"
    # pg18 与旧 pg16 数据目录不兼容，使用独立卷；旧 postgres_data 卷保留作备份。
    # 注意：pg18 官方镜像改了数据目录布局，挂载点须为 /var/lib/postgresql（内部按主版本分子目录），
    # 不能再用 pg16 时代的 /var/lib/postgresql/data。
    volumes:
      - postgres_age_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asuka-redis
    # 有密码时加 requirepass，无密码直接启动
    entrypoint: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD";
        else
          redis-server;
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Java 主服务（可选，开发时直接 mvn spring-boot:run）
  # ─────────────────────────────────────────────────────────────
  java-service:
    image: asuka-file-list:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asuka-java
    profiles: ["app"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      AI_SERVICE_BASE_URL: http://ai-service:8000
      AI_INTERNAL_BASE_URL: http://java-service:8080
    volumes:
      - "${ASUKA_LOCAL_ROOT_WHITELIST:-/tmp/asuka-file-list}:${ASUKA_LOCAL_ROOT_WHITELIST:-/tmp/asuka-file-list}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────
  # Python AI 服务（FastAPI + Celery worker）
  # ─────────────────────────────────────────────────────────────
  ai-service:
    image: asuka-ai-service:latest
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: asuka-ai
    profiles: ["app"]
    expose:
      - "8000"
    env_file:
      - .env
    environment: &ai-env
      POSTGRES_HOST: postgres
      # LightRAG 的 PG 后端 DSN（asyncpg 原生格式）
      POSTGRES_AGE_DSN: postgresql://postgres:${PG_PASSWORD}@postgres:5432/asuka_ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # X-API-Key（与 Java asuka.ai.api-key 对齐）
      API_KEY: ${AI_SERVICE_KEY:-dev-key}
      # 回连 Java（状态回调 / 下载文件）
      MASTER_URL: http://java-service:8080
      MASTER_TOKEN: ${MASTER_TOKEN:-dev-master-token}
      # HuggingFace 镜像 + 离线加载（cache 已预热 bge-m3）
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    # 持久化 HF 模型缓存，避免每次重建容器重新下载 bge-m3
    volumes: &ai-volumes
      - hf_cache:/root/.cache/huggingface
    # GPU 直通（bge-m3 优先用 GPU）。已装 nvidia-container-toolkit 并配置 docker nvidia 运行时。
    # 若在无 GPU/toolkit 的机器上部署，注释本段即可走 CPU 降级。
    deploy: &ai-deploy
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on: &ai-depends
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker：执行知识库索引任务（同 KB 串行，见 Redis 锁）
  ai-worker:
    image: asuka-ai-service:latest
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: asuka-ai-worker
    profiles: ["app"]
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - .env
    environment: *ai-env
    volumes: *ai-volumes
    deploy: *ai-deploy
    depends_on: *ai-depends

volumes:
  mysql_data:
  postgres_data:      # 旧 pg16 数据卷，保留备份
  postgres_age_data:  # 新 pg18 + AGE 数据卷
  redis_data:
  hf_cache:           # HuggingFace 模型缓存（bge-m3）
