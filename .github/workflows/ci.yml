name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  java-test:
    name: Java tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Java tests
        run: mvn test -q

  ai-test:
    name: AI tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-dev.txt

      - name: Install AI test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run AI tests
        run: python -m pytest tests -q

  web-check:
    name: Web lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint

      - name: Build web
        run: npm run build
